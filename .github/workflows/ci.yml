name: Release

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      task_to_run:
        description: 'Which part of the workflow to run'
        type: choice
        options:
          - test
          - release
          - docker
        required: true
        default: 'test'
      tag_name:
        description: 'Required for "release" or "docker" task: The tag for the action (e.g., v1.0.1)'
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: vuio

jobs:
  format:
    name: Rustfmt
    if: |
      github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'test')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy on ${{ matrix.os }}
    if: |
      github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'test')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: clippy-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  full_test:
    name: Locked all-target/all-feature tests
    if: |
      github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'test')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: full-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run locked all-target/all-feature tests
        run: cargo test --locked --all-targets --all-features

  # ===================================================================
  # Run Tests and Checks (Push, Pull Requests, or Manual 'test' run)
  # ===================================================================
  test_and_check:
    name: Test on ${{ matrix.target }}
    # This job runs for branch pushes, pull requests, or when manually triggered with 'test'.
    if: |
      github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'test')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies for ARM cross-compile (Linux)
        if: runner.os == 'Linux' && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf')
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
          fi
      - name: Configure cross-linker (Linux ARM)
        if: runner.os == 'Linux' && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf')
        run: |
          mkdir -p ~/.cargo
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
            echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            echo '[target.armv7-unknown-linux-gnueabihf]' >> ~/.cargo/config.toml
            echo 'linker = "arm-linux-gnueabihf-gcc"' >> ~/.cargo/config.toml
          fi
      - name: Build project
        run: cargo build --target ${{ matrix.target }}
      - name: Run tests
        if: matrix.target != 'aarch64-unknown-linux-gnu' && matrix.target != 'armv7-unknown-linux-gnueabihf' && matrix.target != 'aarch64-pc-windows-msvc' && matrix.target != 'x86_64-pc-windows-msvc'
        run: cargo test --target ${{ matrix.target }}


  # ===================================================================
  # Job 2: Build Release Artifacts (No longer depends on tests)
  # ===================================================================
  build_release_artifacts:
    name: Build release for ${{ matrix.target }}
    # This job runs for tag pushes or when manually triggered with 'release'
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'release')
    # This job no longer depends on test_and_check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os-arch: linux-x86_64
            asset_ext: .tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os-arch: windows-x86_64
            asset_ext: .exe
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os-arch: macos-x86_64
            asset_ext: .tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            os-arch: linux-arm64
            asset_ext: .tar.gz
          - runner: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            os-arch: linux-armv7
            asset_ext: .tar.gz
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            os-arch: windows-arm64
            asset_ext: .exe
          - runner: macos-14
            target: aarch64-apple-darwin
            os-arch: macos-arm64
            asset_ext: .tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install NSIS (Windows)
        if: false # runner.os == 'Windows' - Disabled by user request
        run: choco install nsis
      - name: Install dependencies for ARM cross-compile (Linux)
        if: runner.os == 'Linux' && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf')
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
          fi
      - name: Configure cross-linker (Linux ARM)
        if: runner.os == 'Linux' && (matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf')
        run: |
          mkdir -p ~/.cargo
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
            echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            echo '[target.armv7-unknown-linux-gnueabihf]' >> ~/.cargo/config.toml
            echo 'linker = "arm-linux-gnueabihf-gcc"' >> ~/.cargo/config.toml
          fi
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package artifacts
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.tag_name }}" ]; then
              echo "Error: The 'tag_name' input is required when running the 'release' task."
              exit 1
            fi
            VERSION_TAG="${{ github.event.inputs.tag_name }}"
          else
            VERSION_TAG="${{ github.ref_name }}"
          fi
          VERSION=${VERSION_TAG#v}
          echo "Building artifacts for version: $VERSION_TAG"
          BINARY_PATH_PREFIX="target/${{ matrix.target }}/release"
          ASSET_NAME="${{ env.BINARY_NAME }}-${{ matrix.os-arch }}${{ matrix.asset_ext }}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY_FILE="${{ env.BINARY_NAME }}.exe"
            # Just copy the binary directly instead of building installer
            cp "$BINARY_PATH_PREFIX/$BINARY_FILE" "./$ASSET_NAME"
            # makensis -V2 -DVERSION=$VERSION -DAPP_EXE=$BINARY_FILE -DOUTFILE=$ASSET_NAME installer.nsi
          else
            tar -czf "$ASSET_NAME" -C "$BINARY_PATH_PREFIX" "${{ env.BINARY_NAME }}"
          fi
      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-${{ matrix.os-arch }}
          path: ${{ env.BINARY_NAME }}-*

  # ===================================================================
  # Job 3: Create GitHub Release
  # ===================================================================
  create_github_release:
    name: Create GitHub Release
    # This job runs for tag pushes or when manually triggered with 'release'
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'release')
    runs-on: ubuntu-latest
    needs: build_release_artifacts
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          draft: true
          files: release-artifacts/*/*
          
  # ===================================================================
  # Job 4: Build and Push Docker Image
  # ===================================================================
  build_and_push_docker:
    name: Build and Push Docker Image
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'docker')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:v0.12.5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Version Tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.tag_name }}" ]; then
              echo "Error: The 'tag_name' input is required when running the '${{ github.event.inputs.task_to_run }}' task manually."
              exit 1
            fi
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get_version.outputs.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_version.outputs.TAG }}
            type=semver,pattern={{major}},value=${{ steps.get_version.outputs.TAG }}
            type=raw,value=latest,enable=${{ startsWith(steps.get_version.outputs.TAG, 'v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=buildx-chef
            type=gha,scope=buildx-deps-${{ hashFiles('**/Cargo.lock') }}
            type=gha,scope=buildx-build
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=buildx-chef
            type=gha,mode=max,scope=buildx-deps-${{ hashFiles('**/Cargo.lock') }}
            type=gha,mode=max,scope=buildx-build
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false

  publish_helm_chart:
    name: Publish Helm Chart
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'release')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Package and Push Helm Chart
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.tag_name }}" ]; then
              echo "Error: The 'tag_name' input is required when running the 'release' task."
              exit 1
            fi
            VERSION_TAG="${{ github.event.inputs.tag_name }}"
          else
            VERSION_TAG="${{ github.ref_name }}"
          fi
          
          # Strip leading 'v' if present
          VERSION=${VERSION_TAG#v}
          echo "Packaging Helm chart with version: $VERSION"
          
          # Convert owner to lowercase for GHCR compatibility
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          helm package helm/vuio --version "$VERSION" --app-version "$VERSION"
          helm push vuio-"$VERSION".tgz oci://ghcr.io/"$OWNER"/charts

  update_homebrew_formula:
    name: Update Homebrew Formula
    needs: create_github_release
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Homebrew Tap Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-vuio
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          path: homebrew-vuio

      - name: Calculate Checksums and Update Formula
        run: |
          TAG_NAME="${{ steps.get_tag.outputs.TAG }}"
          VERSION=${TAG_NAME#v}
          
          echo "Fetching checksums for release $TAG_NAME..."
          
          # Helper function to download and get SHA256 of an asset
          get_sha256() {
            local asset_name=$1
            local url="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${asset_name}"
            curl -sSL -o temp_asset "$url"
            sha256sum temp_asset | cut -d' ' -f1
            rm temp_asset
          }
          
          MAC_ARM_SHA=$(get_sha256 "vuio-macos-arm64.tar.gz")
          MAC_INTEL_SHA=$(get_sha256 "vuio-macos-x86_64.tar.gz")
          LINUX_ARM64_SHA=$(get_sha256 "vuio-linux-arm64.tar.gz")
          LINUX_ARMV7_SHA=$(get_sha256 "vuio-linux-armv7.tar.gz")
          LINUX_INTEL_SHA=$(get_sha256 "vuio-linux-x86_64.tar.gz")
          
          echo "Updating Formula/vuio.rb..."
          FORMULA_FILE="homebrew-vuio/Formula/vuio.rb"
          
          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA_FILE"
          
          # Update URLs to new version
          sed -i "s|releases/download/v.*/|releases/download/${TAG_NAME}/|g" "$FORMULA_FILE"
          
          # Use python to safely update the checksum strings in Formula/vuio.rb
          python3 -c "
          import re
          
          mac_arm = '$MAC_ARM_SHA'
          mac_intel = '$MAC_INTEL_SHA'
          linux_arm64 = '$LINUX_ARM64_SHA'
          linux_armv7 = '$LINUX_ARMV7_SHA'
          linux_intel = '$LINUX_INTEL_SHA'
          
          with open('$FORMULA_FILE', 'r') as f:
              content = f.read()
              
          # We search for the specific blocks and replace their SHA256
          # 1. Mac ARM:
          content = re.sub(
              r'(vuio-macos-arm64.tar.gz\"\s+sha256\s+\")[^\"]+(\")',
              r'\g<1>' + mac_arm + r'\g<2>',
              content
          )
          # 2. Mac Intel (x86_64):
          content = re.sub(
              r'(vuio-macos-x86_64.tar.gz\"\s+sha256\s+\")[^\"]+(\")',
              r'\g<1>' + mac_intel + r'\g<2>',
              content
          )
          # 3. Linux ARM64:
          content = re.sub(
              r'(vuio-linux-arm64.tar.gz\"\s+sha256\s+\")[^\"]+(\")',
              r'\g<1>' + linux_arm64 + r'\g<2>',
              content
          )
          # 4. Linux ARMv7:
          content = re.sub(
              r'(vuio-linux-armv7.tar.gz\"\s+sha256\s+\")[^\"]+(\")',
              r'\g<1>' + linux_armv7 + r'\g<2>',
              content
          )
          # 5. Linux Intel (x86_64):
          content = re.sub(
              r'(vuio-linux-x86_64.tar.gz\"\s+sha256\s+\")[^\"]+(\")',
              r'\g<1>' + linux_intel + r'\g<2>',
              content
          )
          
          with open('$FORMULA_FILE', 'w') as f:
              f.write(content)
          "
          
          cd homebrew-vuio
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/vuio.rb
          git commit -m "Update vuio formula to version ${VERSION}"
          git push origin main

